name: Verify marketing production

on:
  workflow_dispatch:
  push:
    branches: [main]

# rulix-site owns the public marketing site. Netlify handles the actual
# rulix.cloud deployment; this workflow only verifies the production build.
permissions:
  contents: read

concurrency:
  group: rulix-marketing-production
  cancel-in-progress: false

jobs:
  verify-marketing:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm test -- --run
      - run: npm run build
