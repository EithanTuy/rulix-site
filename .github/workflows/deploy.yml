name: Deploy production

on:
  workflow_dispatch:
  push:
    branches: [main]

# No job can mint a cloud token unless it opts in explicitly below.
permissions:
  contents: read

concurrency:
  group: rulix-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm test -- --run
      - run: npm run build:lambda
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6
      - name: Validate infrastructure
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate
      - name: Package immutable deployment artifacts
        run: |
          (cd lambda-build && zip -X -q -r ../rulix-app.zip .)
          (cd audit-lambda-build && zip -X -q -r ../rulix-audit-writer.zip .)
          sha256sum rulix-app.zip rulix-audit-writer.zip > rulix-production.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rulix-production-${{ github.sha }}
          path: |
            rulix-app.zip
            rulix-audit-writer.zip
            rulix-production.sha256
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      actions: read
      id-token: write
    steps:
      # The credentialed job never checks out or executes repository source.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rulix-production-${{ github.sha }}
      - name: Verify deployment artifact integrity
        run: sha256sum -c rulix-production.sha256
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::431445330783:role/rulix-github-actions-deploy
          aws-region: us-east-1
          allowed-account-ids: "431445330783"
          mask-aws-account-id: true
      - name: Deploy verified Lambda bundles
        run: |
          aws lambda update-function-code \
            --function-name rulix-prod-app \
            --zip-file fileb://rulix-app.zip >/dev/null
          aws lambda wait function-updated --function-name rulix-prod-app
          aws lambda update-function-code \
            --function-name rulix-prod-audit-writer \
            --zip-file fileb://rulix-audit-writer.zip >/dev/null
          aws lambda wait function-updated --function-name rulix-prod-audit-writer
      - name: Smoke test
        run: |
          curl --fail --retry 6 --retry-delay 5 https://app.rulix.cloud/api/health
          curl --fail --retry 6 --retry-delay 5 https://dashboard.rulix.cloud/
