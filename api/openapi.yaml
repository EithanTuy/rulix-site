openapi: 3.1.0
info:
  title: Rulix ECCN API
  version: 0.1.0
  description: API contract for the ECCN memo review workflow.
servers:
  - url: https://{tenantHost}/api
    variables:
      tenantHost:
        default: tenant.example.com
security:
  - cookieAuth: []
paths:
  /auth/register:
    post:
      summary: Create an account and start a secure session
      operationId: registerAccount
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 12
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/login:
    post:
      summary: Sign in and start a secure session
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/me:
    get:
      summary: Return the current authenticated user and CSRF token
      operationId: getCurrentUser
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Sign in required
  /auth/logout:
    post:
      summary: End the current session
      operationId: logout
      security:
        - cookieAuth: []
          csrfToken: []
      responses:
        "204":
          description: Signed out
  /account/state:
    get:
      summary: Get account-linked review workspace state
      operationId: getAccountState
      responses:
        "200":
          description: Account review state
          content:
            application/json:
              schema:
                type: object
                required: [state]
                properties:
                  state:
                    $ref: "#/components/schemas/AccountReviewState"
        "401":
          description: Sign in required
    put:
      summary: Replace account-linked review workspace state
      operationId: saveAccountState
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state:
                  $ref: "#/components/schemas/AccountReviewState"
      responses:
        "200":
          description: Saved account state
  /health:
    get:
      summary: Check backend health and provider configuration
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required: [ok, service, phase, provider]
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  phase:
                    type: string
                  provider:
                    type: object
                    required: [configured, model]
                    properties:
                      configured:
                        type: boolean
                      model:
                        type: string
  /corpus:
    get:
      summary: Get the active official-source corpus snapshot
      operationId: getCorpus
      security: []
      responses:
        "200":
          description: Corpus snapshot
  /ai/review:
    post:
      summary: Run backend AI council analysis for an ad hoc memo
      operationId: analyzeMemo
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memo]
              properties:
                memo:
                  $ref: "#/components/schemas/MemoRecord"
                depth:
                  $ref: "#/components/schemas/AnalysisDepth"
      responses:
        "200":
          description: Review result
          content:
            application/json:
              schema:
                type: object
                required: [result]
                properties:
                  result:
                    $ref: "#/components/schemas/ReviewResult"
  /documents:
    post:
      summary: Upload a memo or supporting document
      operationId: createDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, documentType]
              properties:
                documentType:
                  type: string
                  enum: [memo, specification, prior-classification, vendor-source, correspondence]
                dataClass:
                  type: string
                  enum: [public, proprietary, export-controlled, itar-risk, cui]
                file:
                  type: string
                  format: binary
      responses:
        "202":
          description: Accepted for extraction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
  /reviews:
    get:
      summary: List stored review memos
      operationId: listReviews
      responses:
        "200":
          description: Review list
    post:
      summary: Create a stored memo review
      operationId: createReview
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                type: object
                required: [review]
                properties:
                  review:
                    $ref: "#/components/schemas/MemoRecord"
  /reviews/{reviewId}:
    get:
      summary: Get a review result
      operationId: getReview
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Review state
          content:
            application/json:
              schema:
                type: object
                required: [review, auditEvents]
                properties:
                  review:
                    $ref: "#/components/schemas/MemoRecord"
                  decision:
                    $ref: "#/components/schemas/ReviewerDecision"
                  auditEvents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
    patch:
      summary: Update memo text for a stored review
      operationId: updateReviewMemoText
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memoText]
              properties:
                memoText:
                  type: string
      responses:
        "200":
          description: Review updated
          content:
            application/json:
              schema:
                type: object
                required: [review]
                properties:
                  review:
                    $ref: "#/components/schemas/MemoRecord"
  /reviews/{reviewId}/analyze:
    post:
      summary: Run AI council analysis for a stored review memo
      operationId: analyzeStoredReview
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                depth:
                  $ref: "#/components/schemas/AnalysisDepth"
      responses:
        "200":
          description: Review result
          content:
            application/json:
              schema:
                type: object
                required: [result]
                properties:
                  result:
                    $ref: "#/components/schemas/ReviewResult"
  /reviews/{reviewId}/chat:
    post:
      summary: Chat about a memo and optionally draft a memo edit
      operationId: chatAboutMemo
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
      responses:
        "200":
          description: Updated memo chat thread
          content:
            application/json:
              schema:
                type: object
                required: [messages]
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/MemoChatMessage"
  /findings/{findingId}:
    patch:
      summary: Update reviewer disposition for a finding
      operationId: updateFinding
      parameters:
        - name: findingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewerStatus]
              properties:
                reviewerStatus:
                  type: string
                  enum: [accepted, rejected, needs-info, escalated]
                note:
                  type: string
      responses:
        "200":
          description: Finding updated
  /reviews/{reviewId}/decision:
    post:
      summary: Submit human reviewer decision
      operationId: createReviewerDecision
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewerDecision"
      responses:
        "200":
          description: Decision recorded
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: rulix_session
    csrfToken:
      type: apiKey
      in: header
      name: x-rulix-csrf
  schemas:
    AuthResponse:
      type: object
      required: [user, csrfToken]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/UserProfile"
            - type: "null"
        csrfToken:
          oneOf:
            - type: string
            - type: "null"
    UserProfile:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [export-control-officer, reviewer, submitter, counsel]
        createdAt:
          type: string
          format: date-time
    AccountReviewState:
      type: object
      required: [memos, decisions, auditEvents, analysisResults, chatMessages]
      properties:
        memos:
          type: array
          items:
            $ref: "#/components/schemas/MemoRecord"
        selectedMemoId:
          type: string
        decisions:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ReviewerDecision"
        auditEvents:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        analysisResults:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ReviewResult"
        chatMessages:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/MemoChatMessage"
    MemoChatMessage:
      type: object
      required: [id, memoId, role, text, createdAt]
      properties:
        id:
          type: string
        memoId:
          type: string
        role:
          type: string
          enum: [user, assistant]
        text:
          type: string
        createdAt:
          type: string
          format: date-time
        proposedMemoText:
          type: string
        applied:
          type: boolean
    AuditEvent:
      type: object
      required: [id, memoId, at, actor, action, detail, severity]
      properties:
        id:
          type: string
        memoId:
          type: string
        at:
          type: string
          format: date-time
        actor:
          type: string
        action:
          type: string
        detail:
          type: string
        severity:
          type: string
          enum: [info, review, escalate]
    Document:
      type: object
      required: [id, status, checksumSha256]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [uploaded, extracting, extracted, failed]
        checksumSha256:
          type: string
        sourceObjectKey:
          type: string
    ItemMetadata:
      type: object
      properties:
        itemName:
          type: string
        itemFamily:
          type: string
        manufacturer:
          type: string
        intendedUse:
          type: string
    NewReviewInput:
      type: object
      required: [title, itemFamily, memoText]
      properties:
        title:
          type: string
        itemFamily:
          type: string
        manufacturer:
          type: string
        intendedUse:
          type: string
        dataClass:
          type: string
          enum: [public, proprietary, export-controlled, itar-risk, cui]
        sourcePath:
          type: string
          enum: [manufacturer, self-classification, ccats, cj, unknown]
        memoText:
          type: string
        attachments:
          type: array
          items:
            type: string
    ReviewRun:
      type: object
      required: [id, status, corpusId]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [queued, running, needs-info, complete, failed]
        corpusId:
          type: string
        recommendedEccn:
          type: string
        jurisdictionOutcome:
          type: string
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
    Finding:
      type: object
      required: [id, status, title, sourceChunkIds]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [strong, weak, missing, conflict]
        title:
          type: string
        claim:
          type: string
        rationale:
          type: string
        excerpt:
          type: string
        start:
          type: number
        end:
          type: number
        sourceChunkIds:
          type: array
          items:
            type: string
        agent:
          type: string
        severity:
          type: string
          enum: [info, review, escalate]
    ReviewerDecision:
      type: object
      required: [action, notes]
      properties:
        action:
          type: string
          enum: [accept, request-info, override]
        notes:
          type: string
        signedBy:
          type: string
        signedAt:
          type: string
    MemoRecord:
      type: object
      required: [id, title, itemFamily, owner, updatedAt, documentCode, status, memoText, attachments]
      properties:
        id:
          type: string
        title:
          type: string
        itemFamily:
          type: string
        owner:
          type: string
        updatedAt:
          type: string
        documentCode:
          type: string
        status:
          type: string
          enum: [draft, ready, needs-info, conflict, signed-off]
        memoText:
          type: string
        attachments:
          type: array
          items:
            type: string
        dataClass:
          type: string
          enum: [public, proprietary, export-controlled, itar-risk, cui]
        manufacturer:
          type: string
        intendedUse:
          type: string
    ReviewResult:
      type: object
      required: [memoId, generatedAt, corpusId, modelPolicy, provider, jurisdiction, recommended, findings, infoRequests, agents]
      properties:
        memoId:
          type: string
        generatedAt:
          type: string
        corpusId:
          type: string
        modelPolicy:
          type: string
        provider:
          type: object
          required: [source, label, model, live, message, checkedAt]
          properties:
            source:
              type: string
              enum: [bedrock, local-rules, fallback]
            label:
              type: string
            model:
              type: string
            depth:
              $ref: "#/components/schemas/AnalysisDepth"
            live:
              type: boolean
            message:
              type: string
            checkedAt:
              type: string
            latencyMs:
              type: number
        jurisdiction:
          type: object
        recommended:
          type: object
        alternatives:
          type: array
          items:
            type: object
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        infoRequests:
          type: array
          items:
            type: string
        agents:
          type: array
          items:
            type: object
    AnalysisDepth:
      type: string
      enum: [standard, deep]
      description: Review depth requested by the browser. Provider model selection is server-owned through BEDROCK_MODEL.
