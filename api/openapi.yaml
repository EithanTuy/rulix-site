openapi: 3.1.0
info:
  title: Rulix ECCN API
  version: 0.2.0
  description: API contract for the ECCN memo review workflow. AI operations use a server-owned data classification, an exact provider-region allowlist, and atomic per-account workload admission; caller labels can never lower those controls.
servers:
  - url: https://{tenantHost}/api
    variables:
      tenantHost:
        default: app.rulix.cloud
security:
  - cookieAuth: []
paths:
  /access-requests:
    post:
      summary: Create a public Rulix access request
      operationId: createAccessRequest
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, organization, role, volume]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 254
                organization:
                  type: string
                  maxLength: 160
                role:
                  type: string
                  maxLength: 120
                volume:
                  type: string
                  enum:
                    - 1-5 reviews / month
                    - 6-20 reviews / month
                    - 21-50 reviews / month
                    - 50+ reviews / month
                review:
                  type: string
                  maxLength: 1200
                sourcePath:
                  type: string
                  maxLength: 200
                website:
                  type: string
                  description: Honeypot field; legitimate clients should leave this empty.
                  maxLength: 200
      responses:
        "201":
          description: Access request persisted or a honeypot submission was quietly discarded
        "400":
          description: Invalid request fields
        "429":
          description: Too many requests
  /admin/access-requests:
    get:
      summary: List persisted public access requests
      operationId: listAccessRequests
      responses:
        "200":
          description: Access request list
          content:
            application/json:
              schema:
                type: object
                required: [requests]
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccessRequest"
        "401":
          description: Authentication required
        "403":
          description: Admin access required
  /admin/users:
    get:
      summary: List one bounded page of aggregate-backed account activity
      operationId: listAdminUsers
      parameters:
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Stable account page; cursors are signed, query-bound, and short-lived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserPage"
        "400":
          description: Invalid or expired cursor
        "403":
          description: Admin access required
        "503":
          description: Mandatory legacy aggregate backfill is incomplete or failed integrity checks
  /admin/outreach-config:
    get:
      summary: Read provider selection and deployment credential readiness without secret material
      operationId: getOutreachProviderConfig
      responses:
        "200":
          description: Deployment-owned provider status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachProviderConfig"
    put:
      summary: Select the deployment-approved, deployment-configured outreach provider
      operationId: setOutreachProviderConfig
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [provider]
              properties:
                provider:
                  type: string
                  enum: [bedrock, anthropic]
      responses:
        "200":
          description: Provider selection saved; credentials remain deployment-owned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachProviderConfig"
        "400":
          description: Unknown or credential-bearing fields were rejected
        "409":
          description: Selection conflicts with the deployment provider policy
        "503":
          description: Deployment credential or provider infrastructure is not ready
  /admin/metrics:
    get:
      summary: Read bounded administrative usage and account metrics
      operationId: getAdminMetrics
      parameters:
        - name: rangeDays
          in: query
          schema:
            type: integer
            enum: [7, 30, 90]
            default: 30
      responses:
        "200":
          description: Exact bounded usage and account-total snapshot with explicit facet availability
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [metrics]
                properties:
                  metrics:
                    $ref: "#/components/schemas/AdminMetrics"
        "400":
          description: rangeDays was not one of 7, 30, or 90
        "403":
          description: Export-control officer access required
        "503":
          description: Exact materialized metrics are not yet available or failed an integrity check
  /admin/outreach:
    get:
      summary: Read the bounded outreach workspace
      operationId: getAdminOutreachWorkspace
      parameters:
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageCursor"
      responses:
        "200":
          description: Leads, drafts, workflows, jobs, runs, and provider readiness
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachWorkspace"
        "400":
          description: Invalid page size or cursor
        "403":
          description: Export-control officer access required
  /admin/outreach/pages/{collection}:
    parameters:
      - name: collection
        in: path
        required: true
        schema:
          type: string
          enum: [leads, lead-rows, drafts, runs, workflows, jobs]
    get:
      summary: Continue one bounded outreach collection
      operationId: getAdminOutreachCollectionPage
      parameters:
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageCursor"
      responses:
        "200":
          description: Query-bound continuation page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachCollectionPage"
        "400":
          description: Invalid, expired, cross-account, cross-collection, or page-size-mismatched cursor
        "404":
          description: Unknown collection
  /admin/outreach/generate:
    post:
      summary: Generate an outreach draft for one stored lead
      operationId: generateAdminOutreachDraft
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [requestId, leadId]
              properties:
                requestId:
                  type: string
                  format: uuid
                leadId:
                  type: string
                  minLength: 1
                  maxLength: 128
                direction:
                  type: string
                  maxLength: 4000
      responses:
        "200":
          description: Generated draft and lead
        "404":
          description: Lead not found
  /admin/outreach/drafts/{leadId}:
    parameters:
      - $ref: "#/components/parameters/LeadId"
    put:
      summary: Save an officer-edited outreach draft
      operationId: saveAdminOutreachDraft
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [subject, body]
              properties:
                subject:
                  type: string
                  minLength: 1
                  maxLength: 998
                body:
                  type: string
                  minLength: 1
                  maxLength: 48000
      responses:
        "200":
          description: Saved draft and lead
  /admin/outreach/drafts/{leadId}/mark-sent:
    parameters:
      - $ref: "#/components/parameters/LeadId"
    post:
      summary: Mark a saved outreach draft sent
      operationId: markAdminOutreachDraftSent
      security:
        - cookieAuth: []
          csrfToken: []
      responses:
        "200":
          description: Updated draft
  /admin/outreach/drafts/{leadId}/personalize:
    parameters:
      - $ref: "#/components/parameters/LeadId"
    post:
      summary: Personalize one saved outreach draft
      operationId: personalizeAdminOutreachDraft
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [requestId]
              properties:
                requestId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Personalized draft and lead
  /admin/leads/{leadId}/workflow:
    parameters:
      - $ref: "#/components/parameters/LeadId"
    put:
      summary: Update one lead review and lifecycle workflow
      operationId: updateAdminLeadWorkflow
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reviewStatus, lifecycleStatus]
              properties:
                reviewStatus:
                  type: string
                  enum: [new, pending-review, approved, rejected, needs-research, ready-to-send]
                lifecycleStatus:
                  type: string
                  enum: [not-contacted, drafted, personalized, approved, sent, replied, follow-up-due, closed, opted-out]
                assignedOwner:
                  type: string
                  maxLength: 240
                notes:
                  type: string
                  maxLength: 10000
                lastContactedAt:
                  type: string
                  format: date-time
                followUpAt:
                  type: string
                  format: date-time
                replyStatus:
                  type: string
                  maxLength: 240
      responses:
        "200":
          description: Updated lead workflow
  /admin/outreach/jobs:
    post:
      summary: Queue a bounded outreach batch job
      operationId: createAdminOutreachJob
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [type]
              properties:
                type:
                  type: string
                  enum: [draft-missing, personalize-all, lead-search]
                maxCostUsd:
                  type: number
                  minimum: 0.05
                  maximum: 100
                maxRetries:
                  type: integer
                  minimum: 0
                  maximum: 5
                direction:
                  type: string
                  maxLength: 4000
                searchDurationSeconds:
                  type: integer
                  minimum: 15
                  maximum: 45
      responses:
        "202":
          description: Queued or immediately completed job
        "422":
          description: Eligible collection exceeds the explicit 1,000-item per-job safety cap
  /admin/outreach/jobs/{jobId}/{action}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 128
      - name: action
        in: path
        required: true
        schema:
          type: string
          enum: [pause, resume, retry, terminate]
    post:
      summary: Control one outreach batch job
      operationId: controlAdminOutreachJob
      security:
        - cookieAuth: []
          csrfToken: []
      responses:
        "200":
          description: Updated job
        "404":
          description: Job not found
        "409":
          description: Job state does not permit the action
  /admin/leads/search:
    post:
      summary: Run one bounded lead-discovery request
      operationId: searchAdminLeads
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                durationSeconds:
                  type: integer
                  minimum: 15
                  maximum: 45
      responses:
        "200":
          description: Discovered leads and search run
        "502":
          description: Search failed before candidates were saved
  /auth/bootstrap-invite:
    post:
      summary: Create the first deployment officer invite using the bootstrap secret
      description: Deployment-only bootstrap endpoint. Invalid or absent x-rulix-bootstrap-secret values receive a non-enumerable 404.
      operationId: createBootstrapInvite
      security: []
      parameters:
        - name: x-rulix-bootstrap-secret
          in: header
          required: true
          schema:
            type: string
            minLength: 32
            maxLength: 512
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 254
                name:
                  type: string
                  maxLength: 120
                role:
                  $ref: "#/components/schemas/UserRole"
      responses:
        "201":
          description: Bootstrap invite created
        "404":
          description: Endpoint unavailable or bootstrap secret invalid
  /auth/invites:
    get:
      summary: List invite status for the tenant
      operationId: listInvites
      responses:
        "200":
          description: Invite status list
          content:
            application/json:
              schema:
                type: object
                required: [invites]
                properties:
                  invites:
                    type: array
                    items:
                      $ref: "#/components/schemas/InviteSummary"
        "403":
          description: Admin access required
    post:
      summary: Create an invite and send the one-time link through SES
      operationId: createInvite
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  $ref: "#/components/schemas/UserRole"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCreationResponse"
        "403":
          description: Admin access required
        "409":
          description: Account or pending invite already exists
  /auth/invite/inspect:
    post:
      summary: Inspect a bounded invite token supplied only in the request body
      operationId: validateInvite
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthTokenRequest"
      responses:
        "200":
          description: Invite token is valid
          content:
            application/json:
              schema:
                type: object
                required: [invite]
                properties:
                  invite:
                    $ref: "#/components/schemas/InvitePublicInfo"
        "404":
          description: Invite token is invalid
        "410":
          description: Invite token is expired or already used
  /auth/invite/accept:
    post:
      summary: Accept an invite, set the initial password, and start a session
      operationId: acceptInvite
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 12
                name:
                  type: string
      responses:
        "201":
          description: Invite accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "410":
          description: Invite token is expired or already used
  /auth/password-reset/request:
    post:
      summary: Request a one-time password reset link
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset request accepted generically
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
  /auth/password-reset/inspect:
    post:
      summary: Inspect a bounded password-reset token supplied only in the request body
      operationId: validatePasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthTokenRequest"
      responses:
        "200":
          description: Reset token is valid
          content:
            application/json:
              schema:
                type: object
                required: [reset]
                properties:
                  reset:
                    $ref: "#/components/schemas/PasswordResetPublicInfo"
        "404":
          description: Reset token is invalid
        "410":
          description: Reset token is expired or already used
  /auth/password-reset/complete:
    post:
      summary: Complete a password reset, revoke old sessions, and start a new session
      operationId: completePasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 12
      responses:
        "200":
          description: Password reset completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/login:
    post:
      summary: Sign in and start a secure session
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/me:
    get:
      summary: Return the current authenticated user and CSRF token
      operationId: getCurrentUser
      security: []
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Sign in required
  /auth/logout:
    post:
      summary: End the current session
      operationId: logout
      security:
        - cookieAuth: []
          csrfToken: []
      responses:
        "204":
          description: Signed out
  /account/preferences:
    get:
      summary: Get versioned workspace preferences
      operationId: getWorkspacePreferences
      responses:
        "200":
          description: Workspace preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePreferences"
    patch:
      summary: Update bounded workspace preferences with compare-and-swap
      operationId: updateWorkspacePreferences
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspacePreferenceUpdateCommand"
      responses:
        "200":
          description: Authoritative updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePreferences"
        "409":
          description: Preference version conflict
  /account/memo-builder/sessions:
    get:
      summary: List memo-builder sessions as a bounded page
      operationId: listMemoBuilderSessions
      parameters:
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageCursor"
      responses:
        "200":
          description: Memo-builder session page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoBuilderSessionPage"
  /account/memo-builder/sessions/{sessionId}:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          pattern: '^builder-[A-Za-z0-9_-]+$'
    put:
      summary: Create or replace one memo-builder session with compare-and-swap
      operationId: upsertMemoBuilderSession
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [expectedVersion, session]
              properties:
                expectedVersion:
                  type: integer
                  minimum: 0
                session:
                  $ref: "#/components/schemas/MemoBuilderSession"
      responses:
        "200":
          description: Authoritative versioned session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionedMemoBuilderSession"
        "409":
          description: Session version conflict
    delete:
      summary: Delete one memo-builder session with compare-and-swap
      operationId: deleteMemoBuilderSession
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpectedVersion"
      responses:
        "204":
          description: Session deleted
        "409":
          description: Session version conflict
  /health:
    get:
      summary: Check backend health and provider configuration
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required: [ok, service, phase, provider]
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  phase:
                    type: string
                  provider:
                    type: object
                    required: [configured]
                    properties:
                      configured:
                        type: boolean
  /corpus:
    get:
      summary: Get the active official-source corpus snapshot
      operationId: getCorpus
      security: []
      responses:
        "200":
          description: Corpus snapshot
  /public-memo-draft:
    post:
      summary: Create a local cautious memo template for later source verification
      operationId: draftPublicMemo
      description: This workflow is deterministic and local-only. It never calls an AI provider, web service, or source-retrieval system because a free-form item description has no server-verifiable public provenance.
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [item]
              properties:
                item:
                  type: string
                  minLength: 1
                  maxLength: 8000
      responses:
        "200":
          description: Local template and explicit zero-provider status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicMemoDraft"
  /documents/extract:
    post:
      summary: Validate and extract text from a bounded document payload
      operationId: extractDocument
      description: Supports plain text, PDF, DOCX, and approved image formats. An explicit recognized classification is required; provider-backed extraction additionally requires an exact-payload officer approval bound to the current provider lane.
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [requestId, fileName, mediaType, dataBase64, dataClass]
              properties:
                requestId:
                  type: string
                  format: uuid
                fileName:
                  type: string
                  minLength: 1
                  maxLength: 140
                mediaType:
                  type: string
                  minLength: 1
                  maxLength: 160
                dataBase64:
                  type: string
                  contentEncoding: base64
                  maxLength: 6292480
                dataClass:
                  type: string
                  enum: [public, proprietary, export-controlled, itar-risk, cui]
      responses:
        "200":
          description: Validated extraction result
          content:
            application/json:
              schema:
                type: object
                required: [extraction]
                properties:
                  extraction:
                    $ref: "#/components/schemas/DocumentExtraction"
        "413":
          description: Document exceeds the decoded size limit
        "400":
          description: File metadata, base64, signature, or DOCX container is invalid
        "403":
          description: Provider-backed binary extraction requires an export-control officer to approve and extract the exact bytes
        "422":
          description: Content or AI egress policy rejected the operation
        "429":
          description: Per-account AI workload limit reached
        "503":
          description: AI egress policy or workload admission unavailable
  /ai/memo-builder-chat:
    post:
      summary: Continue an AI-assisted memo-building conversation
      operationId: memoBuilderChat
      description: The server reloads the saved session and classification, appends one exact pending message, and requires officer approval bound to the semantic payload and exact provider request body before dispatch. Callers cannot submit history or classification here.
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [requestId, sessionId, pendingMessage]
              properties:
                requestId:
                  type: string
                  format: uuid
                sessionId:
                  type: string
                  pattern: '^builder-[A-Za-z0-9_-]+$'
                  maxLength: 128
                pendingMessage:
                  type: string
                  minLength: 1
                  maxLength: 8000
      responses:
        "200":
          description: Assistant reply and optional complete draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoBuildChatResult"
        "403":
          description: Exact conversation requires export-control officer approval
        "422":
          description: Data classification or provider-region policy rejected the operation
        "429":
          description: Per-account AI workload limit reached
        "503":
          description: AI egress policy or workload admission unavailable
  /reviews:
    get:
      summary: List bounded review summaries
      operationId: listReviews
      parameters:
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageCursor"
        - name: state
          in: query
          schema:
            type: string
            enum: [active, archived, all]
            default: active
      responses:
        "200":
          description: Review summary page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewSummaryPage"
    post:
      summary: Idempotently create one stored memo review
      operationId: createReview
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewReviewInput"
      responses:
        "200":
          description: Existing authoritative result replayed for the same request ID and normalized payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewCreateResult"
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewCreateResult"
        "409":
          description: Request ID was already used with a different normalized payload
        "422":
          description: A recognized classification is required and must be permitted by the deployment policy
  /reviews/{reviewId}:
    parameters:
      - $ref: "#/components/parameters/ReviewId"
    get:
      summary: Get authoritative detail for one review
      operationId: getReview
      responses:
        "200":
          description: Targeted review detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDetail"
        "404":
          description: Review not found in the authenticated workspace
    patch:
      summary: Edit memo text or change archival state using current review bindings
      operationId: mutateReview
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/ReviewMemoUpdateCommand"
                - $ref: "#/components/schemas/ReviewArchiveCommand"
      responses:
        "200":
          description: Authoritative updated review and server-authored audit event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewMutationResult"
        "409":
          description: Review version, revision, or content hash is stale
  /reviews/{reviewId}/audit:
    get:
      summary: List one review's server-authored audit history
      operationId: listReviewAuditEvents
      parameters:
        - $ref: "#/components/parameters/ReviewId"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageCursor"
      responses:
        "200":
          description: Audit event page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CursorPage"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuditEvent"
  /ai-approval-requests:
    get:
      summary: List the authenticated account's bounded AI approval requests
      operationId: listOwnAiApprovalRequests
      parameters:
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/AiApprovalRequestStatusFilter"
      responses:
        "200":
          description: Metadata-only account request page; prospective chat text is never listed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiApprovalRequestPage"
    post:
      summary: Request officer approval for one exact server-reconstructed AI operation
      operationId: createAiApprovalRequest
      description: The caller supplies only a target identifier, immutable optimistic bindings, and purpose-specific input. The server reloads all content, derives the target account from the session, constructs exact semantic/provider hashes, and stores memo-chat pending text only in a short-lived encrypted preview.
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/CouncilApprovalRequestCommand"
                - $ref: "#/components/schemas/MemoChatApprovalRequestCommand"
                - $ref: "#/components/schemas/MemoBuilderApprovalRequestCommand"
              discriminator:
                propertyName: purpose
      responses:
        "201":
          description: Immutable pending request created, or an idempotent replay returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiApprovalRequestStatus"
        "409":
          description: Target changed, request ID conflicts, or outstanding-request quota reached
        "422":
          description: Current provider, region, model, or data-class policy is not approved
        "429":
          description: Bounded account or tenant queue quota reached
  /ai-approval-requests/{approvalRequestId}:
    parameters:
      - $ref: "#/components/parameters/AiApprovalRequestId"
    get:
      summary: Get one approval request owned by the authenticated account
      operationId: getOwnAiApprovalRequest
      responses:
        "200":
          description: Exact request status; memo-chat plaintext is never returned on this owner endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiApprovalRequestStatus"
        "404":
          description: Request not found in the authenticated account
  /ai-approval-requests/{approvalRequestId}/cancel:
    parameters:
      - $ref: "#/components/parameters/AiApprovalRequestId"
    post:
      summary: Idempotently cancel one pending request owned by the authenticated account
      operationId: cancelOwnAiApprovalRequest
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiApprovalReasonCommand"
      responses:
        "200":
          description: Cancelled request status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiApprovalRequestStatus"
        "404":
          description: Request is not owned by the authenticated account
        "409":
          description: Request was already decided or expired
  /admin/ai-approval-requests:
    get:
      summary: List tenant AI approval requests for an export-control officer
      operationId: listTenantAiApprovalRequests
      parameters:
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/AiApprovalRequestStatusFilter"
      responses:
        "200":
          description: Metadata-only tenant queue page; prospective chat text is never listed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiApprovalRequestPage"
        "403":
          description: Export-control officer role required
  /admin/ai-approval-requests/{approvalRequestId}:
    parameters:
      - $ref: "#/components/parameters/AiApprovalRequestId"
    get:
      summary: Inspect exact current target content before an officer decision
      operationId: inspectTenantAiApprovalRequest
      description: Reloads the target account's current review or Memo Builder session, decrypts a pending memo-chat preview only for this authorized detail view, and revalidates every exact binding. Approve remains disabled when current is false.
      responses:
        "200":
          description: Officer-only exact content inspection and request status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiApprovalRequestOfficerView"
        "403":
          description: Export-control officer role required
        "404":
          description: Tenant request not found
  /admin/ai-approval-requests/{approvalRequestId}/approve:
    parameters:
      - $ref: "#/components/parameters/AiApprovalRequestId"
    post:
      summary: Approve the immutable request for one target-account dispatch
      operationId: approveTenantAiApprovalRequest
      description: The body cannot override target account, content, classification, provider, region, model, hashes, or expiry. All bindings come from the immutable request and are atomically revalidated.
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiApprovalDecisionCommand"
      responses:
        "200":
          description: Approved request status and target-account approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiApprovalRequestStatus"
        "403":
          description: Export-control officer role required
        "409":
          description: Request expired, was decided, preview expired, or target bindings changed
  /admin/ai-approval-requests/{approvalRequestId}/reject:
    parameters:
      - $ref: "#/components/parameters/AiApprovalRequestId"
    post:
      summary: Reject one pending tenant AI approval request
      operationId: rejectTenantAiApprovalRequest
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiApprovalReasonCommand"
      responses:
        "200":
          description: Rejected request status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiApprovalRequestStatus"
        "403":
          description: Export-control officer role required
        "409":
          description: Request expired or was already decided
  /admin/ai-approval-requests/{approvalRequestId}/revoke:
    parameters:
      - $ref: "#/components/parameters/AiApprovalRequestId"
    post:
      summary: Revoke an approval created from a cross-account queued request
      operationId: revokeTenantQueuedAiApproval
      description: Derives the target account and approval ID only from the immutable approved request and decision; the caller cannot supply either binding.
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiApprovalReasonCommand"
      responses:
        "200":
          description: Approved request with its target-account approval now revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiApprovalRequestStatus"
        "403":
          description: Export-control officer role required
        "409":
          description: Request is not approved or revocation command conflicts
  /reviews/{reviewId}/ai-approvals/council:
    parameters:
      - $ref: "#/components/parameters/ReviewId"
    get:
      summary: Inspect whether the current review revision and depth have a usable exact AI approval
      operationId: getCouncilApproval
      parameters:
        - name: depth
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AnalysisDepth"
      responses:
        "200":
          description: Current exact approval expectation and status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouncilApprovalView"
        "404":
          description: Review not found
    post:
      summary: Approve one exact review revision, depth, policy, semantic payload, and provider body
      operationId: approveCouncilAnalysis
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouncilApprovalCommand"
      responses:
        "201":
          description: Exact single-dispatch approval created by an export-control officer
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [approval, usable]
                properties:
                  approval:
                    $ref: "#/components/schemas/AiApprovalStatus"
                  usable:
                    const: true
        "403":
          description: Export-control officer role required
        "409":
          description: Review bindings became stale before approval
  /ai-approvals/{approvalId}/revoke:
    parameters:
      - name: approvalId
        in: path
        required: true
        schema:
          type: string
          pattern: '^aia-[a-f0-9]{40}$'
    post:
      summary: Idempotently revoke an exact AI approval before dispatch
      operationId: revokeAiApproval
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [requestId, reason]
              properties:
                requestId:
                  type: string
                  format: uuid
                reason:
                  type: string
                  minLength: 1
                  maxLength: 500
      responses:
        "200":
          description: Approval is durably revoked
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [approval, usable]
                properties:
                  approval:
                    $ref: "#/components/schemas/AiApprovalStatus"
                  usable:
                    const: false
        "403":
          description: Export-control officer role required
        "404":
          description: Approval not found in the authenticated account
  /reviews/{reviewId}/analyze:
    post:
      summary: Analyze the exact review revision currently displayed by the caller
      operationId: analyzeStoredReview
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: "#/components/parameters/ReviewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [requestId, expectedVersion, expectedRevision, expectedHash, depth]
              properties:
                requestId:
                  type: string
                  format: uuid
                expectedVersion:
                  type: integer
                  minimum: 1
                expectedRevision:
                  type: integer
                  minimum: 1
                expectedHash:
                  $ref: "#/components/schemas/Sha256"
                depth:
                  $ref: "#/components/schemas/AnalysisDepth"
      responses:
        "200":
          description: Review result
          content:
            application/json:
              schema:
                type: object
                required: [review, result, auditEvents]
                properties:
                  review:
                    $ref: "#/components/schemas/MemoRecord"
                  result:
                    $ref: "#/components/schemas/ReviewResult"
                  decisionInvalidated:
                    type: boolean
                  auditEvents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
        "409":
          description: Review bindings became stale before the analysis result committed
        "403":
          description: No usable exact officer approval exists for this revision and depth
        "422":
          description: Stored classification or current provider-region policy rejected the operation
        "429":
          description: Per-account AI workload limit reached
        "503":
          description: AI egress policy or workload admission unavailable
  /reviews/{reviewId}/chat:
    get:
      summary: List one review's bound chat messages
      operationId: listReviewChatMessages
      parameters:
        - $ref: "#/components/parameters/ReviewId"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageCursor"
      responses:
        "200":
          description: Chat message page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CursorPage"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/MemoChatMessage"
    post:
      summary: Chat about the exact memo revision currently displayed by the caller
      operationId: chatAboutMemo
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: "#/components/parameters/ReviewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [requestId, expectedVersion, expectedRevision, expectedHash, message]
              properties:
                requestId:
                  type: string
                  format: uuid
                expectedVersion:
                  type: integer
                  minimum: 1
                expectedRevision:
                  type: integer
                  minimum: 1
                expectedHash:
                  $ref: "#/components/schemas/Sha256"
                message:
                  type: string
                  minLength: 1
                  maxLength: 8000
                  description: Maximum 8,000 Unicode code points after trimming.
      responses:
        "200":
          description: Updated memo chat thread
          content:
            application/json:
              schema:
                type: object
                required: [review, messages]
                properties:
                  review:
                    $ref: "#/components/schemas/MemoRecord"
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/MemoChatMessage"
                  auditEvents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
        "409":
          description: Review bindings became stale before chat messages committed
        "403":
          description: Exact message requires export-control officer approval or an approved pending request
        "422":
          description: Stored classification or current provider-region policy rejected the operation
        "429":
          description: Per-account AI workload limit reached
        "503":
          description: AI egress policy or workload admission unavailable
  /reviews/{reviewId}/chat/{messageId}/apply:
    post:
      summary: Apply only the server-stored suggestion identified by message ID
      operationId: applyMemoChatSuggestion
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: "#/components/parameters/ReviewId"
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            pattern: '^chat-[A-Za-z0-9_-]+$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [expectedVersion, expectedHash]
              properties:
                expectedVersion:
                  type: integer
                  minimum: 1
                expectedHash:
                  $ref: "#/components/schemas/Sha256"
      responses:
        "200":
          description: Authoritative memo and applied message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewMutationResult"
        "409":
          description: Review or suggestion binding is stale
  /reviews/{reviewId}/decision:
    post:
      summary: Submit human reviewer decision
      operationId: createReviewerDecision
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: "#/components/parameters/ReviewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionCommand"
      responses:
        "200":
          description: Decision recorded
        "409":
          description: Analysis is absent, stale, non-live, or contains blocking findings; only an authorized explicit override can preserve blockers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-rulix_session
    csrfToken:
      type: apiKey
      in: header
      name: x-rulix-csrf
  parameters:
    LeadId:
      name: leadId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[A-Za-z0-9._-]+$'
    ReviewId:
      name: reviewId
      in: path
      required: true
      schema:
        type: string
        pattern: '^(?:review|paste|upload|ai-draft)-[A-Za-z0-9_][A-Za-z0-9_-]*$'
        maxLength: 128
    AiApprovalRequestId:
      name: approvalRequestId
      in: path
      required: true
      schema:
        type: string
        pattern: '^air-[a-f0-9]{40}$'
        maxLength: 128
    AiApprovalRequestStatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [pending, approved, rejected, cancelled, expired]
    PageLimit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 25
    PageCursor:
      name: cursor
      in: query
      schema:
        type: string
        maxLength: 4096
        pattern: '^[A-Za-z0-9_.-]+$'
  schemas:
    AccessRequest:
      type: object
      required: [id, email, organization, role, volume, sourcePath, status, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        organization:
          type: string
        role:
          type: string
        volume:
          type: string
        review:
          type: string
        sourcePath:
          type: string
        status:
          type: string
          enum: [new]
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        code:
          type: string
          maxLength: 128
        error:
          type: string
          maxLength: 2000
        correlationId:
          type: string
          format: uuid
    AuthTokenRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 32
          maxLength: 128
          pattern: '^[A-Za-z0-9_-]+$'
    PublicMemoDraft:
      type: object
      required: [title, memoText, sources, provider]
      properties:
        title:
          type: string
          maxLength: 240
        memoText:
          type: string
          maxLength: 12000
        sources:
          type: array
          maxItems: 20
          items:
            type: object
            required: [title, url]
            properties:
              title:
                type: string
                maxLength: 240
              url:
                type: string
                format: uri
                maxLength: 2048
        provider:
          type: object
          required: [configured, model, live, message]
          properties:
            configured:
              type: boolean
            model:
              type: string
            live:
              type: boolean
            message:
              type: string
    AiApprovalSubject:
      type: object
      additionalProperties: false
      required: [kind, id, version, contentHash]
      properties:
        kind:
          type: string
          enum: [review, document, memo-builder]
        id:
          type: string
          minLength: 1
          maxLength: 512
        version:
          type: integer
          minimum: 1
        revision:
          type: integer
          minimum: 1
        contentHash:
          $ref: "#/components/schemas/Sha256"
    AiApprovalSubjectSummary:
      type: object
      additionalProperties: false
      required: [kind, id, version]
      properties:
        kind:
          type: string
          enum: [review, document, memo-builder]
        id:
          type: string
          minLength: 1
          maxLength: 512
        version:
          type: integer
          minimum: 1
        revision:
          type: integer
          minimum: 1
    AiApprovalPolicy:
      type: object
      additionalProperties: false
      required: [version, mode, provider, clientRegion, model]
      properties:
        version:
          type: string
          minLength: 1
          maxLength: 128
        mode:
          type: string
          enum: [blocked, approved]
        provider:
          type: string
          enum: [amazon-bedrock, anthropic-direct]
        clientRegion:
          type: string
          minLength: 1
          maxLength: 128
        model:
          type: string
          minLength: 1
          maxLength: 512
    AiApprovalRecord:
      type: object
      additionalProperties: false
      required: [schemaVersion, id, requestId, commandHash, tenantId, accountId, purpose, subject, payloadHash, providerRequestHashes, dataClass, policy, approvedBy, approvedAt, expiresAt, validUntilEpoch, expiresAtEpoch, dispatchLimit]
      properties:
        schemaVersion:
          const: rulix.ai-approval/v1
        id:
          type: string
          pattern: '^aia-[a-f0-9]{40}$'
        requestId:
          type: string
          format: uuid
        commandHash:
          $ref: "#/components/schemas/Sha256"
        tenantId:
          type: string
          maxLength: 160
        accountId:
          type: string
          maxLength: 512
        purpose:
          type: string
          enum: [council, memo-chat, memo-builder, document-extraction]
        subject:
          $ref: "#/components/schemas/AiApprovalSubject"
        payloadHash:
          $ref: "#/components/schemas/Sha256"
        providerRequestHashes:
          type: array
          minItems: 1
          maxItems: 2
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Sha256"
        dataClass:
          type: string
          enum: [public, proprietary, export-controlled, itar-risk, cui]
        policy:
          $ref: "#/components/schemas/AiApprovalPolicy"
        approvedBy:
          type: object
          additionalProperties: false
          required: [id, role]
          properties:
            id:
              type: string
              maxLength: 512
            role:
              const: export-control-officer
        approvedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        validUntilEpoch:
          type: integer
          minimum: 1
        expiresAtEpoch:
          type: integer
          minimum: 1
        dispatchLimit:
          type: integer
          minimum: 1
          maximum: 2
    AiApprovalRevocation:
      type: object
      additionalProperties: false
      required: [schemaVersion, approvalId, accountId, requestId, commandHash, revokedBy, revokedAt, reason]
      properties:
        schemaVersion:
          const: rulix.ai-approval-revocation/v1
        approvalId:
          type: string
          maxLength: 160
        accountId:
          type: string
          maxLength: 512
        requestId:
          type: string
          format: uuid
        commandHash:
          $ref: "#/components/schemas/Sha256"
        revokedBy:
          type: string
          maxLength: 512
        revokedAt:
          type: string
          format: date-time
        reason:
          type: string
          minLength: 1
          maxLength: 500
    AiApprovalStatus:
      type: object
      additionalProperties: false
      required: [approval, current, dispatchesReserved]
      properties:
        approval:
          $ref: "#/components/schemas/AiApprovalRecord"
        current:
          type: boolean
        dispatchesReserved:
          type: integer
          minimum: 0
          maximum: 2
        revocation:
          $ref: "#/components/schemas/AiApprovalRevocation"
    AiApprovalDecisionCommand:
      type: object
      additionalProperties: false
      required: [requestId]
      properties:
        requestId:
          type: string
          format: uuid
    AiApprovalReasonCommand:
      type: object
      additionalProperties: false
      required: [requestId, reason]
      properties:
        requestId:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 1
          maxLength: 500
    CouncilApprovalRequestCommand:
      type: object
      additionalProperties: false
      required: [requestId, purpose, reviewId, depth, expectedVersion, expectedRevision, expectedHash]
      properties:
        requestId:
          type: string
          format: uuid
        purpose:
          const: council
        reviewId:
          type: string
          pattern: '^(?:review|paste|upload|ai-draft)-[A-Za-z0-9_][A-Za-z0-9_-]*$'
          maxLength: 128
        depth:
          $ref: "#/components/schemas/AnalysisDepth"
        expectedVersion:
          type: integer
          minimum: 1
        expectedRevision:
          type: integer
          minimum: 1
        expectedHash:
          $ref: "#/components/schemas/Sha256"
    MemoChatApprovalRequestCommand:
      type: object
      additionalProperties: false
      required: [requestId, purpose, reviewId, message, expectedVersion, expectedRevision, expectedHash]
      properties:
        requestId:
          type: string
          format: uuid
        purpose:
          const: memo-chat
        reviewId:
          type: string
