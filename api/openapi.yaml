        end:
          type: number
        sourceChunkIds:
          type: array
          items:
            type: string
        agent:
          type: string
        severity:
          type: string
          enum: [info, review, escalate]
    ReviewerDecision:
      type: object
      required: [id, action, notes, signerId, signedBy, signedAt, createdAt, memoRevision, memoHash, analysisId, analysisHash]
      properties:
        id:
          type: string
        action:
          type: string
          enum: [accept, request-info, override]
        notes:
          type: string
        signedBy:
          type: string
        signedAt:
          type: string
          format: date-time
        signerId:
          type: string
        createdAt:
          type: string
          format: date-time
        memoRevision:
          type: integer
          minimum: 1
        memoHash:
          $ref: "#/components/schemas/Sha256"
        analysisId:
          type: string
        analysisHash:
          $ref: "#/components/schemas/Sha256"
    UserAdminSummary:
      allOf:
        - $ref: "#/components/schemas/UserProfile"
        - type: object
          required: [online, usage]
          properties:
            lastSeenAt:
              type: string
              format: date-time
            online:
              type: boolean
            usage:
              type: object
              required: [costUsd, inputTokens, outputTokens, calls]
              properties:
                costUsd:
                  type: number
                  minimum: 0
                inputTokens:
                  type: number
                  minimum: 0
                outputTokens:
                  type: number
                  minimum: 0
                calls:
                  type: integer
                  minimum: 0
    AdminMetricAvailability:
      type: object
      additionalProperties: false
      required: [status, exact]
      properties:
        status:
          type: string
          enum: [available, unavailable]
        exact:
          type: boolean
        asOf:
          type: string
          format: date-time
        reason:
          type: string
    AdminMetricBucket:
      type: object
      additionalProperties: false
      required: [key, label, costUsd, inputTokens, outputTokens, cacheReadTokens, cacheWriteTokens, calls]
      properties:
        key:
          type: string
        label:
          type: string
        costUsd:
          type: number
          minimum: 0
        inputTokens:
          type: integer
          minimum: 0
        outputTokens:
          type: integer
          minimum: 0
        cacheReadTokens:
          type: integer
          minimum: 0
        cacheWriteTokens:
          type: integer
          minimum: 0
        calls:
          type: integer
          minimum: 0
    AdminMetricTotals:
      type: object
      additionalProperties: false
      required: [costUsd, inputTokens, outputTokens, cacheReadTokens, cacheWriteTokens, calls, avgLatencyMs]
      properties:
        costUsd:
          type: number
          minimum: 0
        inputTokens:
          type: integer
          minimum: 0
        outputTokens:
          type: integer
          minimum: 0
        cacheReadTokens:
          type: integer
          minimum: 0
        cacheWriteTokens:
          type: integer
          minimum: 0
        calls:
          type: integer
          minimum: 0
        avgLatencyMs:
          type: integer
          minimum: 0
    AdminCostTimelinePoint:
      type: object
      additionalProperties: false
      required: [period, label, segments]
      properties:
        period:
          type: string
          pattern: '^\d{4}-\d{2}$'
        label:
          type: string
        segments:
          type: array
          maxItems: 32
          items:
            type: object
            additionalProperties: false
            required: [key, label, costUsd]
            properties:
              key:
                type: string
              label:
                type: string
              costUsd:
                type: number
                minimum: 0
    AdminMetrics:
      type: object
      additionalProperties: false
      required: [generatedAt, rangeDays, rangeStart, rangeEnd, availability, totals, byModel, byCallType, daily, monthlyByModel, monthlyByCallType, pricing, topUsers, users]
      properties:
        generatedAt:
          type: string
          format: date-time
        rangeDays:
          type: integer
          enum: [7, 30, 90]
        rangeStart:
          type: string
          format: date
        rangeEnd:
          type: string
          format: date
        availability:
          type: object
          additionalProperties: false
          required: [status, usage, accountTotal, onlineUsers, topUsers]
          properties:
            status:
              type: string
              enum: [complete, partial]
            usage:
              $ref: "#/components/schemas/AdminMetricAvailability"
            accountTotal:
              $ref: "#/components/schemas/AdminMetricAvailability"
            onlineUsers:
              $ref: "#/components/schemas/AdminMetricAvailability"
            topUsers:
              $ref: "#/components/schemas/AdminMetricAvailability"
        totals:
          $ref: "#/components/schemas/AdminMetricTotals"
        byModel:
          type: array
          maxItems: 4
          items:
            $ref: "#/components/schemas/AdminMetricBucket"
        byCallType:
          type: array
          maxItems: 8
          items:
            $ref: "#/components/schemas/AdminMetricBucket"
        daily:
          type: array
          maxItems: 90
          items:
            $ref: "#/components/schemas/AdminMetricBucket"
        monthlyByModel:
          type: array
          maxItems: 4
          items:
            $ref: "#/components/schemas/AdminCostTimelinePoint"
        monthlyByCallType:
          type: array
          maxItems: 4
          items:
            $ref: "#/components/schemas/AdminCostTimelinePoint"
        pricing:
          type: array
          maxItems: 4
          items:
            type: object
            additionalProperties: false
            required: [key, label, inputPer1M, outputPer1M, cacheReadPer1M, cacheWritePer1M]
            properties:
              key:
                type: string
              label:
                type: string
              inputPer1M:
                type: number
                minimum: 0
              outputPer1M:
                type: number
                minimum: 0
              cacheReadPer1M:
                type: number
                minimum: 0
              cacheWritePer1M:
                type: number
                minimum: 0
        topUsers:
          type: array
          maxItems: 10
          description: Empty in Dynamo mode unless an exact bounded ranking index is available; consult availability.topUsers.
          items:
            type: object
        users:
          type: object
          additionalProperties: false
          required: [total, online]
          properties:
            total:
              type: integer
              minimum: 0
            online:
              type: [integer, "null"]
              minimum: 0
    AdminUserPage:
      type: object
      required: [items, users]
      properties:
        items:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/UserAdminSummary"
        users:
          type: array
          deprecated: true
          description: Compatibility alias of items.
          maxItems: 50
          items:
            $ref: "#/components/schemas/UserAdminSummary"
        nextCursor:
          type: string
    OutreachProviderConfig:
      type: object
      additionalProperties: false
      required: [provider, deploymentProvider, credentialConfigured, ready]
      properties:
        provider:
          type: string
          enum: [bedrock, anthropic]
        deploymentProvider:
          type: string
          enum: [bedrock, anthropic]
        credentialConfigured:
          type: boolean
          description: Boolean readiness only; secret values and fingerprints are never returned.
        ready:
          type: boolean
    OutreachPageMetadata:
      type: object
      additionalProperties: false
      required: [loadedCount, hasMore]
      properties:
        loadedCount:
          type: integer
          minimum: 0
          maximum: 50
        hasMore:
          type: boolean
        nextCursor:
          type: string
          maxLength: 4096
          pattern: '^[A-Za-z0-9_.-]+$'
    OutreachWorkspace:
      type: object
      additionalProperties: false
      required: [leads, drafts, leadSearchRuns, leadWorkflows, outreachJobs, pagination, bedrock]
      properties:
        leads:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/OutreachLead"
        drafts:
          type: object
          maxProperties: 100
          additionalProperties:
            $ref: "#/components/schemas/OutreachDraft"
        leadSearchRuns:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/LeadSearchRun"
        leadWorkflows:
          type: object
          maxProperties: 100
          additionalProperties:
            $ref: "#/components/schemas/LeadWorkflow"
        outreachJobs:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/OutreachJob"
        pagination:
          type: object
          additionalProperties: false
          required: [leads, drafts, runs, workflows, jobs]
          properties:
            leads:
              $ref: "#/components/schemas/OutreachPageMetadata"
            drafts:
              $ref: "#/components/schemas/OutreachPageMetadata"
            runs:
              $ref: "#/components/schemas/OutreachPageMetadata"
            workflows:
              $ref: "#/components/schemas/OutreachPageMetadata"
            jobs:
              $ref: "#/components/schemas/OutreachPageMetadata"
        bedrock:
          type: object
          additionalProperties: false
          required: [ready, provider, model, personalizationModel, leadSearchModel, region]
          properties:
            ready:
              type: boolean
            provider:
              type: string
              enum: [bedrock, anthropic]
            model:
              type: string
            personalizationModel:
              type: string
            leadSearchModel:
              type: string
            region:
              type: string
    OutreachCollectionPage:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 50
          items:
            oneOf:
              - $ref: "#/components/schemas/OutreachLead"
              - $ref: "#/components/schemas/OutreachLeadRow"
              - $ref: "#/components/schemas/OutreachDraft"
              - $ref: "#/components/schemas/LeadSearchRun"
              - $ref: "#/components/schemas/LeadWorkflow"
              - $ref: "#/components/schemas/OutreachJob"
        nextCursor:
          type: string
          maxLength: 4096
          pattern: '^[A-Za-z0-9_.-]+$'
    OutreachLeadRow:
      type: object
      additionalProperties: false
      required: [lead]
      properties:
        lead:
          $ref: "#/components/schemas/OutreachLead"
        draft:
          $ref: "#/components/schemas/OutreachDraft"
        workflow:
          $ref: "#/components/schemas/LeadWorkflow"
    OutreachLead:
      type: object
      additionalProperties: false
      required: [leadId, organization, organizationType, segment, website, domain, city, state, source, sourceUrl, fitScore, priority, email, status, outreachAngle, owner, notes, persona]
      properties:
        leadId: { type: string, minLength: 1, maxLength: 128 }
        organization: { type: string, minLength: 1, maxLength: 500 }
        organizationType: { type: string, maxLength: 128 }
        segment: { type: string, maxLength: 500 }
        website: { type: string, format: uri, maxLength: 2048 }
        domain: { type: string, maxLength: 253 }
        city: { type: string, maxLength: 240 }
        state: { type: string, maxLength: 120 }
        source: { type: string, maxLength: 500 }
        sourceUrl: { type: string, format: uri, maxLength: 2048 }
        fitScore: { type: number, minimum: 0, maximum: 100 }
        priority: { type: string, maxLength: 32 }
        email: { type: string, format: email, maxLength: 254 }
        status: { type: string, maxLength: 240 }
        outreachAngle: { type: string, maxLength: 4000 }
        owner: { type: string, maxLength: 240 }
        notes: { type: string, maxLength: 10000 }
        persona: { type: string, maxLength: 1000 }
        discoveredAt: { type: string, format: date-time }
    OutreachDraft:
      type: object
      additionalProperties: false
      required: [leadId, organization, email, subject, body, model, updatedAt]
      properties:
        leadId: { type: string, minLength: 1, maxLength: 128 }
        organization: { type: string, minLength: 1, maxLength: 500 }
        email: { type: string, format: email, maxLength: 254 }
        subject: { type: string, minLength: 1, maxLength: 998 }
        body: { type: string, minLength: 1, maxLength: 48000 }
        model: { type: string, maxLength: 512 }
        updatedAt: { type: string, format: date-time }
        generatedAt: { type: string, format: date-time }
        sentAt: { type: string, format: date-time }
        personalizationStatus:
          type: string
          enum: [generic, personalized, needs-research]
        personalizationDetail: { type: string, maxLength: 10000 }
        personalizationRelevance: { type: string, maxLength: 10000 }
        personalizationSourceTitle: { type: string, maxLength: 1000 }
        personalizationSourceUrl: { type: string, format: uri, maxLength: 2048 }
        personalizationVerifiedAt: { type: string, format: date-time }
        personalizationConfidence: { type: number, minimum: 0, maximum: 1 }
    LeadSearchRun:
      type: object
      additionalProperties: false
      required: [id, startedAt, completedAt, durationSeconds, model, status, addedLeadIds, activity]
      properties:
        id: { type: string, minLength: 1, maxLength: 128 }
        startedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        durationSeconds: { type: integer, minimum: 15, maximum: 45 }
        model: { type: string, maxLength: 512 }
        status: { type: string, enum: [completed, failed] }
        addedLeadIds:
          type: array
          maxItems: 12
          items: { type: string, maxLength: 128 }
        activity:
          type: array
          maxItems: 100
          items:
            type: object
            additionalProperties: false
            required: [at, message]
            properties:
              at: { type: string, format: date-time }
              message: { type: string, maxLength: 2000 }
        error: { type: string, maxLength: 4000 }
    LeadWorkflow:
      type: object
      additionalProperties: false
      required: [leadId, reviewStatus, lifecycleStatus, updatedAt]
      properties:
        leadId: { type: string, minLength: 1, maxLength: 128 }
        reviewStatus:
          type: string
          enum: [new, pending-review, approved, rejected, needs-research, ready-to-send]
        lifecycleStatus:
          type: string
          enum: [not-contacted, drafted, personalized, approved, sent, replied, follow-up-due, closed, opted-out]
        assignedOwner: { type: string, maxLength: 240 }
        notes: { type: string, maxLength: 10000 }
        lastContactedAt: { type: string, format: date-time }
        followUpAt: { type: string, format: date-time }
        replyStatus: { type: string, maxLength: 240 }
        updatedAt: { type: string, format: date-time }
    OutreachJob:
      type: object
      additionalProperties: false
      required: [id, type, status, itemIds, cursor, completedCount, failedCount, retryCount, maxRetries, maxCostUsd, estimatedCostUsd, createdAt, updatedAt, logs]
      properties:
        id: { type: string, minLength: 1, maxLength: 128 }
        type: { type: string, enum: [draft-missing, personalize-all, lead-search] }
        status: { type: string, enum: [queued, running, paused, completed, failed, terminated] }
        itemIds:
          type: array
          maxItems: 1000
          items: { type: string, minLength: 1, maxLength: 128 }
        cursor: { type: integer, minimum: 0, maximum: 1000 }
        completedCount: { type: integer, minimum: 0, maximum: 1000 }
        failedCount: { type: integer, minimum: 0, maximum: 1000 }
        retryCount: { type: integer, minimum: 0, maximum: 5 }
        maxRetries: { type: integer, minimum: 0, maximum: 5 }
        maxCostUsd: { type: number, minimum: 0.01, maximum: 100 }
        estimatedCostUsd: { type: number, minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        direction: { type: string, maxLength: 4000 }
        searchDurationSeconds: { type: integer, minimum: 15, maximum: 45 }
        error: { type: string, maxLength: 4000 }
        logs:
          type: array
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [at, message, level]
            properties:
              at: { type: string, format: date-time }
              message: { type: string, maxLength: 2000 }
              level: { type: string, enum: [info, success, warning, error] }
    MemoRecord:
      type: object
      required: [id, title, itemFamily, owner, updatedAt, documentCode, status, memoText, attachments, version, revision, contentHash]
      properties:
        id:
          type: string
        title:
          type: string
        itemFamily:
          type: string
        owner:
          type: string
        updatedAt:
          type: string
        documentCode:
          type: string
        status:
          type: string
          enum: [draft, ready, needs-info, conflict, signed-off]
        memoText:
          type: string
        attachments:
          type: array
          items:
            type: string
        version:
          type: integer
          minimum: 1
        revision:
          type: integer
          minimum: 1
        contentHash:
          $ref: "#/components/schemas/Sha256"
        dataClass:
          type: string
          enum: [public, proprietary, export-controlled, itar-risk, cui]
        manufacturer:
          type: string
        intendedUse:
          type: string
    ReviewResult:
      type: object
      required: [memoId, generatedAt, corpusId, modelPolicy, provider, jurisdiction, recommended, findings, infoRequests, agents]
      properties:
        memoId:
          type: string
        generatedAt:
          type: string
        corpusId:
          type: string
        modelPolicy:
          type: string
        provider:
          type: object
          required: [source, label, model, live, message, checkedAt]
          properties:
            source:
              type: string
              enum: [bedrock, local-rules, fallback]
            label:
              type: string
            model:
              type: string
            depth:
              $ref: "#/components/schemas/AnalysisDepth"
            live:
              type: boolean
            message:
              type: string
            checkedAt:
              type: string
            latencyMs:
              type: number
        jurisdiction:
          type: object
        recommended:
          type: object
        alternatives:
          type: array
          items:
            type: object
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        infoRequests:
          type: array
          items:
            type: string
        agents:
          type: array
          items:
            type: object
    AnalysisDepth:
      type: string
      enum: [standard, deep]
      description: Review depth requested by the browser. Provider model selection is server-owned through BEDROCK_MODEL.
