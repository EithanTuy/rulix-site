<!DOCTYPE html>

  <head>

    <style>
      * {

      }

      html,

        width: 1920px;
        height: 1080px;

        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #071014;
      }

      .clip {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        transform-origin: center center;
      }

      #narration {
        width: 1px;
        height: 1px;
      }
    </style>
